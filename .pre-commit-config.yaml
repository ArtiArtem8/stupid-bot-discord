default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.18
    hooks:
      - id: uv-lock

  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]

      - id: ruff-check
        name: ruff check --fix
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]

      - id: basedpyright
        name: basedpyright
        entry: uv run basedpyright
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: ty
        name: ty
        entry: uv run ty check
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: pytest
        name: pytest
        entry: uv run pytest -q
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: uv-audit-runtime
        name: uv audit runtime
        entry: uv audit --no-dev --preview-features audit --ignore GHSA-mrfv-m5wm-5w6w
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
