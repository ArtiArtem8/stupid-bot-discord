name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check Linux launcher
        run: |
          test -x runstupidbot.sh
          sh -n runstupidbot.sh

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Check lockfile
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Dependency audit
        run: uv audit --no-dev --preview-features audit --ignore GHSA-mrfv-m5wm-5w6w

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check --output-format=github .

      - name: Basedpyright
        run: uv run basedpyright

      - name: ty
        run: uv run ty check

      - name: Tests
        run: uv run pytest -q
